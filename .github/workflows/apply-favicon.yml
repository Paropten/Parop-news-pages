name: Apply favicon to news pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.html'
      - 'docs/favicon.svg'
      - '.github/workflows/apply-favicon.yml'

permissions:
  contents: write

jobs:
  apply-favicon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add favicon link to HTML files
        run: |
          python - <<'PY'
          from pathlib import Path

          favicon_line = '<link rel="icon" href="favicon.svg" type="image/svg+xml">'
          docs = Path('docs')

          for path in sorted(docs.glob('*.html')):
              text = path.read_text(encoding='utf-8')
              if 'rel="icon"' in text or "rel='icon'" in text:
                  continue
              if '</title>' in text:
                  text = text.replace('</title>', '</title>\n' + favicon_line, 1)
              elif '<head>' in text:
                  text = text.replace('<head>', '<head>\n' + favicon_line, 1)
              else:
                  continue
              path.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No favicon updates needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.html
          git commit -m "Apply favicon to all news pages"
          git push
