<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paropten新聞</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d7dee8;
      --accent: #18324a;
      --accent2: #0b5394;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.8;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      background: var(--accent);
      color: white;
      padding: 28px;
      border-radius: 18px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }
    header h1 { margin: 0 0 8px; font-size: 2rem; }
    header p { margin: 0; color: #dbeafe; }
    section {
      background: var(--card);
      padding: 22px;
      border-radius: 16px;
      border: 1px solid var(--line);
      margin-bottom: 20px;
    }
    h2 { margin-top: 0; border-bottom: 2px solid var(--line); padding-bottom: 8px; }
    a { color: var(--accent2); text-decoration: none; font-weight: 700; }
    a:hover { text-decoration: underline; }
    .note { color: var(--muted); font-size: 0.95rem; }
    .empty {
      background: #f8fafc;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
    }
    footer { color: var(--muted); font-size: 0.9rem; margin-top: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Paropten新聞</h1>
    <p>日刊AIニュースのHTML保管庫です。Notionには要約とURLを残し、全文HTMLはこちらで管理します。</p>
  </header>

  <section>
    <h2>日刊一覧</h2>
    <div class="empty">
      日刊HTMLは次回生成分からここに追加します。
    </div>
  </section>

  <section>
    <h2>運用メモ</h2>
    <p class="note">
      公開ページのため、顧客名・社内事情・未公開案件・個人情報は掲載しない前提で運用します。
    </p>
  </section>

  <footer>
    Generated for Paropten News Archive.
  </footer>
</body>
</html>
